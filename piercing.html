    <script>
        // Reusable function for tap behavior
        function setupTapBehavior(elements, getLinkFn) {
            let lastTap = 0;
            const DOUBLE_TAP_DELAY = 300; // milliseconds

            elements.forEach(element => {
                element.addEventListener('touchend', function(e) {
                    const currentTime = new Date().getTime();
                    const tapLength = currentTime - lastTap;

                    if (tapLength < DOUBLE_TAP_DELAY && tapLength > 0) {
                        // Double tap detected
                        e.preventDefault(); // Prevent default click/navigation
                        clearTimeout(this.tapTimer); // Clear any pending single tap
                        const link = getLinkFn(this);
                        if (link) {
                            window.open(link, '_blank');
                        }
                        lastTap = 0; // Reset for next tap sequence
                    } else {
                        // Single tap detected (or start of a new tap sequence)
                        this.tapTimer = setTimeout(() => {
                            this.classList.toggle('color-mode');
                            lastTap = 0; // Reset for next tap sequence
                        }, DOUBLE_TAP_DELAY);
                        lastTap = currentTime;
                    }
                });
            });
        }
        const menu = document.querySelector('#mobile-menu');
        const navLinks = document.querySelector('.nav-links');
        menu.addEventListener('click', () => navLinks.classList.toggle('active'));

        // Apply tap behavior to gallery images
        const galleryImagesGaleria = document.querySelectorAll('.content-grid .content-card img');
        setupTapBehavior(galleryImagesGaleria, (element) => element.src);
    </script>
